<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Happy Birthday</title>

  <!-- Animate CSS -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.5.2/animate.min.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="wrapper">

    <!-- Birthday Text -->
    <div id="wish">

      <div>H</div>
      <div>A</div>
      <div>P</div>
      <div>P</div>
      <div>Y</div>

      <span class="space"></span>

      <div>B</div>
      <div>I</div>
      <div>R</div>
      <div>T</div>
      <div>H</div>
      <div>D</div>
      <div>A</div>
      <div>Y</div>

      <span class="space"></span>

      <div>B</div>
      <div>A</div>
      <div>G</div>
      <div>A</div>
      <div>S</div>

    </div>

    <!-- Photo -->
    <img
      src="IMG_20260307_195040.jpg"
      id="foto"
      alt="Birthday Photo"
    />

    <!-- Gift Box -->
    <div id="present">

      <img
        src="https://media.tenor.com/images/80b3edbf059ce9f4c86282d6f7774b16/tenor.gif"
        id="cat"
        alt="Cat"
      />

      <div id="box"></div>

      <div id="top">
        <img
          src="https://pngimg.com/uploads/ribbon/ribbon_PNG1547.png"
          alt="Ribbon"
        />
      </div>

    </div>

  </div>

  <!-- jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
